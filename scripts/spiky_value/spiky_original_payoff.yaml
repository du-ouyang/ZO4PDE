# Original spiky-value diagnostic with aligned payoff-sample value losses.
#
# This keeps the old `spiky` payoff but trains both methods' value components
# from payoff samples. ZOD keeps online multi-point LS with M=1.
#
# Run from the repository root:
#   python scripts/spiky_value/run_spiky_value.py --config scripts/spiky_value/spiky_original_payoff.yaml

problem:
  seed: 42
  x_min: -2.0
  x_max: 2.0
  sigma_sde: 0.02
  tau: 1.0
  payoff_variant: spiky
  rough_scale: 1.0
  solution_scale: 1.0
  base_sin_freq: 1.3
  base_cos_freq: 4.7

network:
  hidden: 256
  layers: 4

nn_autodiff:
  nn_value_target: payoff
  batch_size: 32768
  value_steps: 10000
  lr_value: 3.0e-4

zod:
  zod_mode: online
  online_estimator: mp
  online_value_target: payoff
  online_avg: 1
  online_batch_size: 16384
  online_steps: 5000
  lr_online: 5.0e-4
  eps: 0.01
  z_sampler: mc
  noise_sampler: mc

evaluation:
  test_points: 1000
  dtype: float32
  print_freq: 0

output:
  out_dir: scripts/spiky_value/results_spiky_zod_bs16384_eps001
